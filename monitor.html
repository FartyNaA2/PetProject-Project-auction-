<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Monitor</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { color: #a855f7; margin-bottom: 40px; }
        .dashboard {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .stat-card {
            background-color: #1c1c1e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 30px;
            width: 250px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .stat-title { font-size: 1.2rem; color: #8e8e93; margin-bottom: 15px; }
        .stat-value { font-size: 3rem; font-weight: bold; color: #30d158; }
        .stat-value.danger { color: #ff453a; }
    </style>
</head>
<body>
    <h1>Системний Монітор</h1>
    <div class="dashboard">
        <div class="stat-card"><div class="stat-title">👥 Онлайн</div><div class="stat-value" id="users">0</div></div>
        <div class="stat-card"><div class="stat-title">⚡ CPU Load</div><div class="stat-value" id="cpu">0%</div></div>
        <div class="stat-card"><div class="stat-title">🧠 RAM Used</div><div class="stat-value" id="ram">0%</div></div>
    </div>
    <div id="error-msg" style="color: #ff453a; margin-top: 30px; text-align: center; font-size: 1.5rem; font-weight: bold;"></div>
    <script>
        async function fetchStats() {
            try {
                let res = await fetch('/api/status');
                
                if (!res.ok) {
                    throw new Error(`Помилка підключення: ${res.status}`);
                }
                
                let data = await res.json();
                if (data.error) throw new Error(data.error);

                document.getElementById('users').innerText = data.active_users;
                let cpu = document.getElementById('cpu'); cpu.innerText = data.cpu_load_percent + '%'; cpu.className = data.cpu_load_percent > 80 ? 'stat-value danger' : 'stat-value';
                document.getElementById('ram').innerText = data.ram_used_percent + '%';
                
                document.getElementById('error-msg').innerText = "";
            } catch(e) {
                document.getElementById('users').innerText = "❌";
                document.getElementById('cpu').innerText = "ERR";
                document.getElementById('ram').innerText = "ERR";
                
                let reason = e.message;
                if (reason.includes("Failed to fetch")) {
                    reason = "Зв'язок розірвано! Перевірте, чи працює сервер у PyCharm і чи телефон підключений до того ж Wi-Fi.";
                }
                document.getElementById('error-msg').innerText = reason;
            }
        }
        setInterval(fetchStats, 2000); fetchStats();
    </script>
</body>
</html>
